companies:
  # ---------- 親ポータル ----------
  - id: root-portal
    name: Root Portal
    kind: portal
    site: https://garyohosu.github.io/
    enabled: true
    adsense_required: true
    required_adsense_pages:
      - /privacy-policy/
      - /contact/
    required_keywords:
      - Virtual Company
    checks:
      - site_http
      - top_page_keyword
      - link_health
      - adsense_pages

  # ---------- バーチャルカンパニー ----------
  - id: auto-ai-blog
    name: Auto AI Blog
    kind: virtual_company
    repo: garyohosu/auto-ai-blog
    site: https://garyohosu.github.io/auto-ai-blog/
    enabled: true
    portal_visible: true
    adsense_required: true
    required_artifacts:
      - type: site_path
        path: /index.html
      - type: site_path
        path: /feed.xml
    daily_post_strategy:
      - feed_xml
      - site_path_pattern
    daily_post_locator:
      feed_url: https://garyohosu.github.io/auto-ai-blog/feed.xml
      path_pattern: https://garyohosu.github.io/auto-ai-blog/posts/{yyyy}/{mm}/{dd}/
      timezone: Asia/Tokyo
    adsense_marker_keyword: adsbygoogle
    required_adsense_pages:
      - /privacy-policy/
      - /contact/
    checks:
      - github_actions
      - site_http
      - artifact
      - daily_post_previous_day
      - adsense_pages

  - id: magic-box-ai
    name: MagicBoxAI
    kind: virtual_company
