<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CompanyGuardian | Living System Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@400;700&family=Noto+Sans+JP:wght@300;400;700&display=swap');

        :root {
            --bg-dark: #050510;
            --accent-primary: #00f2ff;
            --accent-secondary: #7000ff;
            --status-ok: #00ffaa;
            --status-warn: #ffcc00;
            --status-error: #ff3366;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            overflow-x: hidden;
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Noto Sans JP', sans-serif;
        }

        .font-orbitron { font-family: 'Orbitron', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.6;
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .neon-border {
            border: 1px solid var(--accent-primary);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        .status-pulse {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            position: relative;
        }

        .status-ok { background-color: var(--status-ok); box-shadow: 0 0 10px var(--status-ok); }
        .status-warn { background-color: var(--status-warn); box-shadow: 0 0 10px var(--status-warn); }
        .status-error { background-color: var(--status-error); box-shadow: 0 0 10px var(--status-error); }

        .pulse-animation {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(0, 242, 255, 0.1);
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
            pointer-events: none;
            animation: scan 8s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .hud-circle {
            border: 2px dashed var(--accent-primary);
            border-radius: 50%;
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--accent-primary); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="bg-canvas"></div>
    <div class="scanline"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Three.js Background Component ---
        const Background = () => {
            useEffect(() => {
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                document.getElementById('bg-canvas').appendChild(renderer.domElement);

                const particlesGeometry = new THREE.BufferGeometry();
                const particlesCount = 2000;
                const posArray = new Float32Array(particlesCount * 3);

                for (let i = 0; i < particlesCount * 3; i++) {
                    posArray[i] = (Math.random() - 0.5) * 10;
                }

                particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
                const material = new THREE.PointsMaterial({
                    size: 0.005,
                    color: 0x00f2ff,
                    transparent: true,
                    opacity: 0.8
                });

                const particlesMesh = new THREE.Points(particlesGeometry, material);
                scene.add(particlesMesh);
                camera.position.z = 2;

                const animate = () => {
                    requestAnimationFrame(animate);
                    particlesMesh.rotation.y += 0.001;
                    particlesMesh.rotation.x += 0.0005;
                    renderer.render(scene, camera);
                };
                animate();

                const handleResize = () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                };
                window.addEventListener('resize', handleResize);

                return () => {
                    window.removeEventListener('resize', handleResize);
                };
            }, []);
            return null;
        };

        // --- UI Components ---
        const StatusCard = ({ company }) => {
            const cardRef = useRef(null);

            useEffect(() => {
                gsap.from(cardRef.current, {
                    y: 20,
                    opacity: 0,
                    duration: 0.8,
                    delay: Math.random() * 0.5,
                    ease: "power3.out"
                });
            }, []);

            const getStatusClass = (status) => {
                switch(status) {
                    case 'OK': return 'status-ok';
                    case 'WARN': return 'status-warn';
                    case 'ERROR': return 'status-error';
                    default: return 'status-ok';
                }
            };

            return (
                <div 
                    ref={cardRef}
                    className="glass p-6 rounded-xl hover:neon-border transition-all duration-300 group cursor-pointer relative overflow-hidden"
                >
                    <div className="absolute top-0 right-0 p-2 opacity-20 group-hover:opacity-100 transition-opacity">
                        <i data-lucide="external-link" className="w-4 h-4"></i>
                    </div>
                    <div className="flex items-center mb-4">
                        <span className={`status-pulse ${getStatusClass(company.status)} pulse-animation`}></span>
                        <h3 className="text-xl font-bold font-orbitron tracking-wider">{company.name}</h3>
                    </div>
                    <div className="space-y-2 text-sm font-mono opacity-80">
                        <div className="flex justify-between">
                            <span>ID:</span>
                            <span>{company.id}</span>
                        </div>
                        <div className="flex justify-between">
                            <span>KIND:</span>
                            <span className="text-cyan-400">{company.kind.toUpperCase()}</span>
                        </div>
                        <div className="flex justify-between">
                            <span>LAST CHECK:</span>
                            <span>2026-03-10 09:00</span>
                        </div>
                    </div>
                    <div className="mt-4 pt-4 border-t border-white/10 flex gap-2">
                        {company.checks.slice(0, 3).map((check, i) => (
                            <span key={i} className="text-[10px] px-2 py-1 bg-white/5 rounded border border-white/5">
                                {check}
                            </span>
                        ))}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [companies, setCompanies] = useState([
                { id: 'root-portal', name: 'Root Portal', kind: 'portal', status: 'OK', checks: ['site_http', 'top_page_keyword', 'link_health'] },
                { id: 'auto-ai-blog', name: 'Auto AI Blog', kind: 'virtual_company', status: 'OK', checks: ['github_actions', 'site_http', 'artifact'] },
                { id: 'magic-box-ai', name: 'MagicBoxAI', kind: 'virtual_company', status: 'OK', checks: ['site_http', 'adsense_pages'] },
                { id: 'ai-tec-blog', name: 'AITecBlog', kind: 'virtual_company', status: 'OK', checks: ['github_actions', 'site_http'] },
                { id: 'company-guardian', name: 'CompanyGuardian', kind: 'guardian', status: 'OK', checks: ['github_actions', 'self_status'] },
            ]);

            useEffect(() => {
                lucide.createIcons();
            }, [companies]);

            return (
                <div className="min-h-screen p-8 relative">
                    <Background />
                    
                    {/* Header */}
                    <header className="flex justify-between items-center mb-12 glass p-6 rounded-2xl neon-border">
                        <div>
                            <h1 className="text-3xl font-bold font-orbitron tracking-tighter flex items-center gap-3">
                                <i data-lucide="shield-check" className="text-cyan-400 w-8 h-8"></i>
                                COMPANY GUARDIAN
                            </h1>
                            <p className="text-xs font-mono text-cyan-400/70 mt-1">VIRTUAL COMPANY SURVEILLANCE SYSTEM</p>
                        </div>
                        <div className="text-right font-mono">
                            <div className="text-xs opacity-60">SYSTEM STATUS</div>
                            <div className="text-sm text-status-ok font-bold">ALL SYSTEMS OPERATIONAL</div>
                        </div>
                    </header>

                    {/* Hero Section */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-12">
                        <div className="lg:col-span-2 flex flex-col justify-center items-center glass p-12 rounded-3xl relative overflow-hidden">
                            <div className="hud-circle absolute w-[400px] h-[400px] opacity-10"></div>
                            <div className="relative z-10 text-center">
                                <div className="text-8xl font-orbitron font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500">
                                    98%
                                </div>
                                <div className="text-xl font-orbitron tracking-widest mt-4">GLOBAL HEALTH</div>
                            </div>
                        </div>
                        <div className="glass p-8 rounded-3xl flex flex-col justify-between">
                            <div>
                                <h2 className="text-xl font-orbitron mb-6 flex items-center gap-2">
                                    <i data-lucide="activity" className="text-cyan-400"></i>
                                    METRICS
                                </h2>
                                <div className="space-y-6 font-mono">
                                    <div>
                                        <div className="flex justify-between text-xs mb-1">
                                            <span>UPTIME</span>
                                            <span>99.9%</span>
                                        </div>
                                        <div className="w-full h-1 bg-white/10 rounded-full overflow-hidden">
                                            <div className="h-full bg-cyan-400 w-[99.9%]"></div>
                                        </div>
                                    </div>
                                    <div>
                                        <div className="flex justify-between text-xs mb-1">
                                            <span>INCIDENTS (24H)</span>
                                            <span>2</span>
                                        </div>
                                        <div className="w-full h-1 bg-white/10 rounded-full overflow-hidden">
                                            <div className="h-full bg-yellow-400 w-[20%]"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <button className="w-full py-4 bg-cyan-400/10 border border-cyan-400/30 rounded-xl hover:bg-cyan-400/20 transition-all font-orbitron tracking-widest text-sm">
                                RUN MANUAL CHECK
                            </button>
                        </div>
                    </div>

                    {/* Monitoring Grid */}
                    <div className="mb-12">
                        <h2 className="text-2xl font-orbitron mb-8 flex items-center gap-3">
                            <i data-lucide="layout-grid" className="text-cyan-400"></i>
                            MONITORING TARGETS
                        </h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                            {companies.map(company => (
                                <StatusCard key={company.id} company={company} />
                            ))}
                        </div>
                    </div>

                    {/* Footer */}
                    <footer className="mt-20 border-t border-white/10 pt-8 flex justify-between items-center text-xs font-mono opacity-50">
                        <div>© 2026 COMPANY GUARDIAN / GARYOHOSU</div>
                        <div className="flex gap-6">
                            <a href="#" className="hover:text-cyan-400">DOCS</a>
                            <a href="#" className="hover:text-cyan-400">REPORTS</a>
                            <a href="#" className="hover:text-cyan-400">INCIDENTS</a>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
